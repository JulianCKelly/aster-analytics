version: 2

sources:
  - name: raw
    database: DBT_CORTEX_LLMS
    schema: STAGE
    tables:
      - name: patients
        description: "Cross-border patient registry with origin and US identifiers"
        columns:
          - name: patient_id
            tests:
              - not_null
              - unique

      - name: clinical_encounters
        description: "Clinical encounters across origin and US facilities"
        columns:
          - name: encounter_id
            tests:
              - not_null
              - unique

      - name: lab_results
        description: "Lab results from origin and US facilities with LOINC codes"
        columns:
          - name: lab_id
            tests:
              - not_null
              - unique

      - name: care_gaps
        description: "Identified care gaps from cross-border record fragmentation"
        columns:
          - name: gap_id
            tests:
              - not_null
              - unique
